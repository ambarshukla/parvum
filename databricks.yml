# Databricks Asset Bundle — the bronze job defined as code.
#
# Why a bundle: a job clicked together in the Workflows UI isn't reviewable,
# reproducible, or in git. This file *is* the job; `make deploy-job` applies it.
#
# The workspace host is deliberately absent — the CLI takes it from
# DATABRICKS_HOST (.env locally, a repo secret in CI), so the public repo
# carries no workspace URL. Same recipe as `make land`.
bundle:
  name: parvum

# Supplied at deploy time (BUNDLE_VAR_alert_email, from .env via `make
# deploy-job`), never written here — a real address in a public repo is both a
# privacy leak and spam bait. `make deploy-job` requires it.
variables:
  alert_email:
    description: Address for this job's failure and long-run notifications.

# Deploy the job definition and nothing else. By default a bundle uploads its
# whole directory to the workspace; since the job runs from a git checkout
# (see git_source), those files would never be read — a third copy of the code
# to wonder about later. An empty path list keeps the deploy to what it means.
sync:
  paths: []

resources:
  jobs:
    # The resource KEY stays `bronze_ingest` even though the job outgrew the
    # name: changing a bundle key destroys and recreates the resource (new
    # job id, new trigger object) for a rename nobody sees — the key never
    # appears in the UI. The display name below is what the UI shows.
    bronze_ingest:
      name: parvum-ingest
      description: >-
        The ingest chain: bronze parses newly landed custodial feed files
        into raw Delta tables, then silver rebuilds the conformed layer
        (positions joined to the securities master and ownership). Triggered
        by file arrival in the landing volume, so it follows the data rather
        than a clock. Idempotent end to end: bronze skips files already in
        bronze_file_registry; silver is a full rebuild.

      # This job runs unattended — nobody is watching it — so a failure has to
      # announce itself. Email covers "ran and failed"; a hung run trips the
      # duration warning below. What email CANNOT catch is "never fired" (a job
      # that doesn't start sends nothing) — the D-018 trigger blind spot — which
      # is why daily-feeds.yml carries a separate freshness gate.
      email_notifications:
        on_failure:
          - ${var.alert_email}
        on_duration_warning_threshold_exceeded:
          - ${var.alert_email}

      # The duration the warning above fires on. A normal run is ~2 minutes;
      # 20 means something is wedged and burning the serverless quota.
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 1200

      # The job checks out this repo per run and executes the notebook from
      # that checkout. Two reasons, both load-bearing:
      #
      # 1. The notebook imports the repo's own parsers via a relative path
      #    (`../ingest/src`), so it needs the whole repo tree present — not
      #    just spark/. A checkout gives it exactly the layout it expects.
      # 2. `main` is protected and CI-gated, so "the job runs main" already
      #    has a review gate in front of it. No separate deploy of the code
      #    is needed, and there's no third copy to drift (the interactive
      #    Git folder stays for exploration only).
      git_source:
        git_url: https://github.com/ambarshukla/parvum
        git_provider: gitHub
        git_branch: main

      tasks:
        - task_key: bronze
          # No compute block: Free Edition is serverless-only, so the job
          # picks up serverless by default.
          notebook_task:
            notebook_path: spark/bronze_ingest
            source: GIT

        # Silver rides the same trigger, downstream of bronze — file
        # arrives → bronze → silver, one chain. No trigger of its own to
        # go dark, and the job's failure/long-run alerting covers both
        # tasks for free. Silver is a full rebuild (a pure projection of
        # bronze × reference), so running it after every bronze run is
        # correct by construction, not just convenient.
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: spark/silver_positions
            source: GIT

        # Cash is a separate notebook and task, not an extension of the
        # positions one: the positions notebook is live and proven, and the
        # two only share the ownership bridge (which each builds from code).
        # Both depend on bronze alone, so they may run in parallel.
        - task_key: silver_cash
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: spark/silver_cash
            source: GIT

        # Reconciliation reads bronze (both holdings copies) and silver_cash
        # (the conformed movements — half of the dual integrity check), so it
        # waits on silver_cash; bronze is complete by then transitively.
        - task_key: dq_recon
          depends_on:
            - task_key: silver_cash
          notebook_task:
            notebook_path: spark/dq_recon
            source: GIT

        # Gold reads both silver branches (positions + cash owner tables) and
        # the DQ verdicts (books_reconcile rides the wealth table), so it
        # waits on silver and dq_recon; dq_recon covers silver_cash
        # transitively. The chain ends here: file → bronze → silver ∥ cash →
        # recon → reports.
        - task_key: gold
          depends_on:
            - task_key: silver
            - task_key: dq_recon
          notebook_task:
            notebook_path: spark/gold_reports
            source: GIT

      # Event-driven, not a timer. A cron would have to *guess* how long
      # after 06:15 UTC the feed finishes landing, and would silently
      # process nothing whenever that guess was wrong.
      trigger:
        pause_status: UNPAUSED
        file_arrival:
          url: /Volumes/workspace/parvum/landing/raw/
          # One delivery is three files landing seconds apart. Waiting for
          # the arrivals to go quiet coalesces them into one run instead of
          # three overlapping ones.
          wait_after_last_change_seconds: 60
          # A floor on trigger frequency — cheap insurance for a free-tier
          # compute quota against a pathological upload loop.
          min_time_between_triggers_seconds: 300

      # One run at a time: two concurrent runs would both see the same
      # "new files" set (the registry is written last) and double-insert.
      max_concurrent_runs: 1

      # A hung run burns the daily serverless quota until it's noticed.
      timeout_seconds: 3600

    # A separate job, not a task bolted onto bronze_ingest above: alts
    # documents are episodic (landed on demand via `make land-alts-docs`),
    # not a daily feed, and registration-only bronze (no parser to run) is
    # a much smaller chain than the custodial one. Keeping it a separate
    # resource means this job's own deploy/trigger history never touches
    # the critical daily job's.
    alts_bronze_ingest:
      # Display name kept in sync with what the job now does (bronze +
      # silver), same "key is forever, name isn't" rule as bronze_ingest
      # above — the resource key stays alts_bronze_ingest so a rename never
      # destroys/recreates the job.
      name: parvum-alts-ingest
      description: >-
        Registers newly landed private-fund documents and LLM extraction
        results (bronze_alts_documents, bronze_alts_extractions), then
        validates each extraction against the rest of its fund's documents
        — commitment continuity, call sequencing, statement chaining — and
        routes it to auto_accept or needs_review (silver_alts_documents,
        D-049). Triggered by file arrival in the alts landing volume.

      email_notifications:
        on_failure:
          - ${var.alert_email}

      git_source:
        git_url: https://github.com/ambarshukla/parvum
        git_provider: gitHub
        git_branch: main

      tasks:
        - task_key: bronze_alts
          notebook_task:
            notebook_path: spark/bronze_alts_ingest
            source: GIT

        - task_key: silver_alts
          depends_on:
            - task_key: bronze_alts
          notebook_task:
            notebook_path: spark/silver_alts_documents
            source: GIT

      trigger:
        pause_status: UNPAUSED
        file_arrival:
          url: /Volumes/workspace/parvum/landing/alts/raw/
          wait_after_last_change_seconds: 60
          min_time_between_triggers_seconds: 300

      max_concurrent_runs: 1
      timeout_seconds: 900

# One target, because there is one live environment (D-007). `mode: production`
# means no auto-paused triggers and no `[dev ...]` name prefixes — the things
# development mode does to keep experiments from acting like the real thing.
targets:
  prod:
    mode: production
    default: true
    workspace:
      # Production mode demands an explicit root_path so two deploys can't
      # silently clobber each other. Interpolated from the authenticated
      # user rather than hardcoded, which also keeps the email out of a
      # public repo.
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
