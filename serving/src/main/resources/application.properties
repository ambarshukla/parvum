# Datasource. Three environments, three sources of truth:
#   tests — no URL configured, so Quarkus Dev Services starts a throwaway
#           Postgres container (image pinned to the docker-compose major);
#   dev   — the docker-compose Postgres from `make up`;
#   prod  — environment variables (QUARKUS_DATASOURCE_JDBC_URL etc.) supplied
#           by the deployment; no defaults on purpose, so a misconfigured
#           deploy fails loudly instead of silently hitting localhost.
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/parvum
%dev.quarkus.datasource.username=parvum
%dev.quarkus.datasource.password=parvum_local_dev
%test.quarkus.datasource.devservices.image-name=postgres:16

# Migrations are applied per tenant schema by TenantSchemas at startup, not by
# the extension's single-schema migrate-at-start.
quarkus.flyway.migrate-at-start=false

# The advisory firms this instance serves; each maps to Postgres schema
# tenant_<id>. Aldergate advises the Hartwell family; Stonefield advises
# Okafor and Reyes (whose shared account makes cross-owner views interesting).
parvum.tenants=aldergate,stonefield

# CORS (D-032's deferred question, now answered): dev needs none (the Vite
# proxy keeps everything same-origin); prod does, now that the frontend is
# hosted apart from the API. The specific origin(s) are supplied at deploy
# time via QUARKUS_HTTP_CORS_ORIGINS (Terraform), not hardcoded here, since
# they're a deployment fact, not a build fact.
%prod.quarkus.http.cors.enabled=true
