# CI: every pull request (and main) must pass lint, format check, and tests.
# Runs per-component: ingest/ and reference/ today (two uv-workspace
# members, one job each so both appear as separate required checks); later
# jobs join for serving/ (mvn verify) and infra/ (terraform fmt/validate).
# The two Python jobs are deliberately explicit rather than a matrix — a
# matrix renames the status checks, which would silently detach the
# branch-protection rule that requires the check named "ingest".
name: CI

on:
  pull_request:
  push:
    branches: [main]

# A new push to the same PR cancels the previous, now-obsolete run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingest
    steps:
      # Major versions pinned; bumped when runners deprecate the Node
      # runtime older action versions target (v4/v5 targeted Node 20).
      - uses: actions/checkout@v5

      # Version pinned to match local dev, and so setup-uv never has to ask
      # the GitHub API for "latest" (an outage there once failed our CI).
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"

      # --locked: fail if uv.lock is out of sync with pyproject.toml, so CI
      # always tests exactly the pinned dependency set.
      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

  export:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: export
    # The loader tests apply the serving Flyway DDL to a real Postgres and
    # exercise truncate-and-reload against it; a service container gives CI
    # the database the docker-compose one provides locally. Credentials
    # mirror the compose defaults, so the tests' default DSN just works.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: parvum
          POSTGRES_PASSWORD: parvum_local_dev
          POSTGRES_DB: parvum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parvum -d parvum"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"

      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      # -rs so a skipped DB test is visible in the log — in CI the service
      # container exists, so a skip here means something is wrong.
      - name: Tests
        run: uv run pytest -rs

  serving:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serving
    steps:
      - uses: actions/checkout@v5

      # Java 21 LTS to match local dev; temurin is the runner-cached
      # distribution (the vendor difference from a local Oracle JDK is
      # immaterial — both build the same bytecode from the same release).
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # verify = compile + tests + format check (spotless). Tests boot the
      # whole app against a throwaway Postgres container (Quarkus Dev
      # Services), which needs the runner's Docker daemon.
      - name: Build and test
        run: ./mvnw -B verify

  reference:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"

      # Syncs the whole workspace (the lockfile lives at the repo root),
      # then runs checks with reference/ as the working directory.
      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

  alts-hitl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alts-hitl
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"

      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      # Node 22 LTS to match local dev; npm cache keyed on the committed
      # lockfile so `npm ci` installs exactly the resolved dependency set.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      # tsc runs again inside `build`, but keeping the type step explicit means
      # a type error is reported as a type error, not a build failure.
      - name: Build
        run: npm run build

  internal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: internal
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: internal/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
