# Keeps the internal app's review queue (and its mirrored PDFs) in sync
# with the lakehouse, unattended — the counterpart to export-gold.yml for
# the alts human-in-the-loop side. Before this workflow, `load-review-queue`
# and `sync-review-decisions` were local-only make targets: a fresh
# needs_review document (or a document routed to a new template, D-061)
# would sit invisible on the live internal app until someone happened to run
# `make load-review-queue` from a laptop, and a decision made in the app
# would sit un-landed until someone ran `make sync-review-decisions`. Both
# are now scheduled, same as export-gold.
#
# Auth mirrors export-gold.yml exactly: OIDC to AWS (no static key), same
# role, RDS password read fresh from SSM. sync-review-decisions additionally
# needs the databricks CLI on PATH (it shells out to `databricks fs cp`),
# so this workflow installs it too.
name: sync-review-queue

on:
  schedule:
    # Weekdays, 08:10 UTC — a few minutes behind export-gold (08:00), no
    # dependency between them (different Postgres tables, different gold/
    # silver sources) but staggered so their logs don't interleave.
    - cron: "10 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: sync-review-queue
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: export
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::656326303611:role/parvum-github-actions
          aws-region: us-east-1

      - name: Fetch the RDS password from SSM
        id: rds
        run: |
          PASSWORD=$(aws ssm get-parameter --name /parvum/rds/password --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"

      # Only sync-review-decisions needs this (it shells out to `databricks
      # fs cp`), but installing it once for the whole job is simpler than
      # scoping it to one step.
      - uses: databricks/setup-cli@v1.8.0

      - name: Install dependencies
        run: uv sync --locked

      # Push any decisions made in the internal app back to the lakehouse
      # first, so they are in the volume before this run's load reads
      # current state. Landing decisions is what feeds the widened
      # parvum-alts-ingest file-arrival trigger (databricks.yml) that
      # re-validates and re-routes them into silver_alts_documents — that
      # reprocessing happens on Databricks' own schedule, not this step, so
      # today's newly-synced decisions typically show up as
      # reviewed_status/confirmed_fields_json starting tomorrow's run, same
      # one-day lag export-gold already has relative to daily-feeds.
      - name: Sync review decisions back to the alts volume
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          PARVUM_PG_DSN: postgresql://parvum:${{ steps.rds.outputs.password }}@parvum.ckzg8c4g8vzy.us-east-1.rds.amazonaws.com:5432/parvum?sslmode=require
        run: uv run parvum-sync-review-decisions

      # Independent of the step above (it just reads current lakehouse
      # state), so it still runs even if the sync step found nothing to
      # sync or failed outright — a stalled decision-sync must not also
      # block the queue/PDFs from refreshing.
      - name: Reload the review queue and mirrored PDFs
        if: always()
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
          PARVUM_PG_DSN: postgresql://parvum:${{ steps.rds.outputs.password }}@parvum.ckzg8c4g8vzy.us-east-1.rds.amazonaws.com:5432/parvum?sslmode=require
        run: uv run parvum-load-review-queue
